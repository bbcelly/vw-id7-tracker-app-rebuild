services:
  ev-tracker:
    image: ghcr.io/bbcelly/vw-id7-tracker-app-rebuild:latest
    build: .
    container_name: ev-tracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ev_data:/app/data
    healthcheck:
      # /api/status renders from stored data only — never calls the VW backend.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/status').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ev_data:
